name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller TikTokAutoUploader.spec

      - name: Create release zip
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "TikTokAutoUploader-${tag}.zip"
          Compress-Archive -Path "dist\TikTokAutoUploader\*" -DestinationPath "dist\$zipName"
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/${{ env.ZIP_NAME }}"
          generate_release_notes: true
